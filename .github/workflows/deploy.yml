name: Deploy Lottery Data

on:
  push:
    branches: [main]
    paths:
      - '로또 회차별 당첨번호.xlsx'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # <--- 이 줄을 추가하면 Actions 탭에서 수동 실행 버튼이 생깁니다!

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl
      - name: Convert Excel → JSON + manifest
        run: |
          python convert_excel_to_draws.py "로또 회차별 당첨번호.xlsx" \
            --version 3 --output-dir dist \
            --base-url "https://s73325475-cyber.github.io/lotto-data"
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
