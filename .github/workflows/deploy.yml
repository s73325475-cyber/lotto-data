name: Deploy Lottery Data

on:
  push:
    paths:
      - '로또 회차별 당첨번호.xlsx'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas openpyxl
        
      - name: Run Converter
        run: |
          # 1. 엑셀 데이터를 JSON으로 변환
          python convert_excel_to_draws.py "로또 회차별 당첨번호.xlsx" --version 3 --output-dir dist --base-url "https://s73325475-cyber.github.io/lotto-data"
          
          # 2. manifest.json 갱신 (직접 생성/업데이트)
          # 파이썬 스크립트가 manifest를 자동으로 안 만든다면, 여기서 직접 최신 회차 번호를 써서 파일을 생성합니다.
          # 1227회 데이터를 반영하도록 강제로 latestDrawNo를 1227로 업데이트합니다.
          echo '{"version": 3, "latestDrawNo": 1227, "updatedAt": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > dist/manifest.json
          
          echo "Build completed. Content of dist folder:"
          ls -R dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
